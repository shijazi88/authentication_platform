server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Standard SPA fallback — any unknown path serves index.html so React
    # Router can handle client-side routes like /tenants/:id.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets (Vite appends hash to filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Don't cache index.html so new builds roll out immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }

    # Basic security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
