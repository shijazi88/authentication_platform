# =============================================================================
# Base configuration — common to all profiles.
# Profile-specific overrides live in application-{profile}.yml
#
# Active profile selection (highest precedence first):
#   1. CLI:   ./mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#   2. JVM:   -Dspring.profiles.active=dev
#   3. Env:   SPRING_PROFILES_ACTIVE=dev
#   4. Below: spring.profiles.active default
# =============================================================================

spring:
  application:
    name: authentication-middleware
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    open-in-view: false
    hibernate:
      # Flyway is the source of truth — never let Hibernate touch the schema.
      ddl-auto: none
    properties:
      hibernate:
        jdbc.time_zone: UTC
        format_sql: false
        # Store UUIDs as CHAR(36) instead of BINARY(16) so values are
        # human-readable in MySQL and seed scripts can use plain string literals.
        type.preferred_uuid_jdbc_type: CHAR

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always

# CORS — override via CORS_ALLOWED_ORIGINS env var in production.
# Comma-separated list of origins, e.g. "https://portal.example.com,https://staging.example.com".
platform:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      yemen-id:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      yemen-id:
        maxAttempts: 3
        waitDuration: 500ms
        retryExceptions:
          - java.io.IOException
          - java.util.concurrent.TimeoutException
