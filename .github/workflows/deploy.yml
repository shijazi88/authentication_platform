name: Build & Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/shijazi88/sanad-backend
  PORTAL_IMAGE: ghcr.io/shijazi88/sanad-portal

jobs:
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & push portal image
        uses: docker/build-push-action@v6
        with:
          context: ./portal-admin
          file: ./portal-admin/Dockerfile
          push: true
          tags: |
            ${{ env.PORTAL_IMAGE }}:latest
            ${{ env.PORTAL_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to Droplet
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/sanad

            # Pull latest images
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull backend portal

            # Restart with new images (zero-downtime: old container runs until new one is healthy)
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean old images
            docker image prune -f

            echo "✓ Deployed $(date)"
