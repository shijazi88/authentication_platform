# =============================================================================
# Sanad Production Stack — DigitalOcean Droplet
#
# Usage:
#   cp .env.example .env        # fill in secrets
#   docker compose -f docker-compose.prod.yml up -d
#
# Architecture:
#   sanad-api.promatrix.ai    → nginx:80 → backend:8080 (Spring Boot)
#   sanad-portal.promatrix.ai → nginx:80 → portal:3000 (React static)
#                                nginx:80 → /admin/*,/api/* proxied to backend
#   Cloudflare handles HTTPS termination (SSL mode: Full).
# =============================================================================

services:
  mysql:
    image: mysql:8.4
    container_name: sanad-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-sanad}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: UTC
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+00:00
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/shijazi88/sanad-backend:latest
    container_name: sanad-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME:-sanad}?useSSL=false&serverTimezone=UTC&characterEncoding=utf8&allowPublicKeyRetrieval=true
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      PLATFORM_SECURITY_JWT_SECRET: ${JWT_SECRET}
      PLATFORM_SECURITY_JWT_ISSUER: sanad-platform
      YEMEN_ID_BASE_URL: ${YEMEN_ID_BASE_URL:-http://wiremock:8080/base_path}
      YEMEN_ID_BEARER_TOKEN: ${YEMEN_ID_BEARER_TOKEN:-dev-token}
      CORS_ALLOWED_ORIGINS: https://sanad-portal.promatrix.ai
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-false}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      PORT: 8080
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  portal:
    image: ghcr.io/shijazi88/sanad-portal:latest
    container_name: sanad-portal
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: sanad-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - portal
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal

  # Optional: WireMock for testing without real Yemen ID backend
  wiremock:
    image: wiremock/wiremock:3.9.1
    container_name: sanad-wiremock
    restart: unless-stopped
    profiles: ["wiremock"]
    volumes:
      - ./wiremock:/home/wiremock
    command: ["--global-response-templating"]
    networks:
      - internal

volumes:
  mysql_data:

networks:
  internal:
    driver: bridge
